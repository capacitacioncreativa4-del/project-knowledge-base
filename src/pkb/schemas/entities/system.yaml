$schema: "http://json-schema.org/draft-07/schema#"
title: System
type: object
required:
  - entity
  - id
  - name
  - description
  - components
properties:
  entity:
    type: string
    const: System
  id:
    type: string
    pattern: "^SYS-[0-9]{6}$"
  name:
    type: string
  description:
    type: string
  components:
    type: array
    items:
      type: string
  metadata:
    type: object