$schema: "http://json-schema.org/draft-07/schema#"
title: ObjectLifecycle
type: object
required:
  - entity
  - object_id
  - current_status
  - updated_at
properties:
  entity:
    type: string
    const: ObjectLifecycle
  object_id:
    type: string
  current_status:
    type: string
    enum: [DRAFT, REVIEW, VALIDATED, APPROVED, PUBLISHED, DEPRECATED, ARCHIVED]
  updated_at:
    type: string
    format: date