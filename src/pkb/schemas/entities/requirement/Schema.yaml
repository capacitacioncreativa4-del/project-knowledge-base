$schema: "http://json-schema.org/draft-07/schema#"
title: Requirement
type: object
required:
  - entity
  - id
  - title
  - type
  - status
  - relationships
properties:
  entity:
    type: string
    const: Requirement
  id:
    type: string
    pattern: "^REQ-[A-Z0-9-]+$"
  title:
    type: string
  type:
    type: string
    enum: [FUNCTIONAL, NON_FUNCTIONAL]
  status:
    type: string
    enum: [DRAFT, REVIEW, VALIDATED, APPROVED, PUBLISHED, DEPRECATED, ARCHIVED]
  relationships:
    type: object
    required:
      - implements
      - governed_by
    properties:
      implements:
        type: array
        items:
          type: string
      governed_by:
        type: array
        items:
          type: string